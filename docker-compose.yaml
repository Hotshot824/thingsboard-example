services:
  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: thingsboard
      POSTGRES_USER: thingsboard
      POSTGRES_PASSWORD: thingsboard
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thingsboard -d thingsboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: bitnamilegacy/kafka:4.0
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "1883:1883"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    entrypoint:
      - sh
      - -c
      - |
        rabbitmq-plugins enable --offline rabbitmq_mqtt
        exec docker-entrypoint.sh rabbitmq-server
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  thingsboard-ce:
    image: thingsboard/tb-node:4.3.1.3
    ports:
      - "8080:8080"
      - "11883:1883" 
      - "5683:5683"
      - "7070:7070"
      - "9090:9090"
    environment:
      TB_SERVICE_TYPE: "monolith"
      TB_TRANSPORT_TYPE: "local"
      TB_QUEUE_TYPE: "kafka"
      TB_KAFKA_SERVERS: "kafka:9092"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/thingsboard"
      SPRING_DATASOURCE_USERNAME: "thingsboard"
      SPRING_DATASOURCE_PASSWORD: "thingsboard"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - thingsboard-data:/data
      - thingsboard-logs:/var/log/thingsboard

  thingsboard-gateway:
    image: hotshot824/tb-gateway:3.8.0-pshsud-0.0.1
    container_name: thingsboard-gateway
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      thingsboard-ce:
        condition: service_started
    environment:
      - TB_GW_HOST=thingsboard-ce
      - TB_GW_PORT=1883
      - TB_GW_SECURITY_TYPE=accessToken
      - TB_GW_ACCESS_TOKEN=hIW8O1y968cHqz4xxHqG
    volumes:
      - ./config:/thingsboard_gateway/config
      - ./logs/gateway:/thingsboard_gateway/logs
      - ./extensions:/thingsboard_gateway/extensions

  mqtt-publisher-test:
      image: alpine:latest
      restart: always
      depends_on:
        rabbitmq:
          condition: service_healthy
      volumes:
        - ./mqtt-publisher-entrypoint.sh:/entrypoint.sh:ro
      environment:
        - THINGSBOARD_HOST=rabbitmq
        - THINGSBOARD_MQTT_PORT=1883
        - TOPIC=sensor/data
        - DEVICE_NAME_PREFIX=Auto_Test_Device
        - RABBITMQ_USER=guest
        - RABBITMQ_PASSWORD=guest
      entrypoint: ["/entrypoint.sh"]
      deploy:
        replicas: 5

volumes:
  postgres-data:
  kafka-data:
  thingsboard-data:
  thingsboard-logs:
  rabbitmq-data: